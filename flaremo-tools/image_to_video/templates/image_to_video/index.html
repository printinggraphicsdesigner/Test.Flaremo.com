<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flaremo AI Studio - Text to Video</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #loadingArea { display: none; margin-top: 20px; text-align: center; }
        #videoResult { display: none; margin-top: 30px; text-align: center; }
        video { width: 100%; border-radius: 10px; max-height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h2 class="text-center mb-4 text-primary">🎬 Flaremo AI Video Maker</h2>
                
                <form id="aiForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Video Description (Prompt)</label>
                        <textarea name="prompt" class="form-control" rows="3" placeholder="Example: A futuristic city at sunset, cinematic style..."></textarea>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2 fw-bold">Generate Video</button>
                </form>

                <div id="loadingArea">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 fw-bold">AI Engine is processing... <br> <span class="text-muted">(This may take 3-5 minutes on CPU)</span></p>
                </div>

                <div id="videoResult">
                    <h4 class="text-success mb-3">Generation Successful!</h4>
                    <video id="outVideo" controls>
                        <source src="" type="video/mp4">
                    </video>
                    <div class="mt-3">
                        <a id="downBtn" href="#" class="btn btn-outline-success" download>Download Video</a>
                    </div>
                </div>
              

                        <div class="max-w-5xl mx-auto mt-12 px-4">
    <h2 class="text-2xl font-bold mb-4">How to Use This Tool</h2>

    <div class="prose max-w-none bg-white p-6 rounded-xl shadow">
        {{ tool.content|safe }}
    </div>
</div>


            </div>
        </div>

    </div>
</div>



<script>
$(document).ready(function() {
    $('#aiForm').on('submit', function(e) {
        e.preventDefault();
        
        let formData = new FormData(this);
        $('#submitBtn').prop('disabled', true);
        $('#loadingArea').fadeIn();
        $('#videoResult').hide();

        $.ajax({
            url: "{% url 'image_to_video' %}", // আপনার urls.py এর name অনুযায়ী
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            timeout: 0, // আনলিমিটেড সময় অপেক্ষা করবে
            success: function(response) {
                $('#loadingArea').hide();
                $('#submitBtn').prop('disabled', false);
                
                if (response.status === 'success') {
                    $('#outVideo source').attr('src', response.video_url);
                    $('#outVideo')[0].load();
                    $('#downBtn').attr('href', response.video_url);
                    $('#videoResult').slideDown();
                } else {
                    alert("Error: " + response.message);
                }
            },
            error: function(xhr, status, error) {
                $('#loadingArea').hide();
                $('#submitBtn').prop('disabled', false);
                alert("Server Connection Failed. Please check Hugging Face Space Logs.");
            }
        });
    });
});
</script>

</body>
</html>
