{% extends 'base.html' %}

{% block content %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
    :root { --flaremo-orange: #ff6a00; }
    .card-premium { border-radius: 12px; border: 1px solid #ddd; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .btn-orange { background: var(--flaremo-orange); color: #fff; border: none; font-weight: 600; padding: 10px 25px; border-radius: 6px; }
    .btn-orange:hover { background: #e65f00; color: #fff; }
    
    .upload-zone { border: 2px dashed var(--flaremo-orange); background: #fffaf7; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; }
    .scan-line { width: 100%; height: 4px; background: var(--flaremo-orange); display: none; margin: 20px 0; position: relative; overflow: hidden; }
    .scan-line::after { content: ''; position: absolute; width: 80px; height: 100%; background: #fff; box-shadow: 0 0 15px 5px var(--flaremo-orange); animation: scan 1.5s infinite linear; }
    @keyframes scan { 0% { left: -80px; } 100% { left: 100%; } }

    /* ছবি ৬ অনুযায়ী আউটপুট ডিজাইন */
    .result-box { display: none; margin-top: 25px; background: #fafafa; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
    #output-text { width: 100%; min-height: 350px; border: 1px solid #ccc; border-radius: 8px; padding: 15px; font-size: 16px; background: #fff; }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card-premium p-4 p-md-5">
                <h2 class="text-center fw-bold">Image to Text Converter</h2>
                <p class="text-center text-muted">Convert picture into text with Flaremo OCR tool.</p>

                <div class="upload-zone" id="drop-area">
                    <i class="fas fa-cloud-upload-alt fa-3x text-orange mb-3" style="color: #ff6a00;"></i>
                    <h4>Drag and drop images here</h4>
                    <button class="btn btn-orange mt-2">Browse Files</button>
                    <input type="file" id="file-input" hidden accept="image/*">
                    <br>
                    <img id="preview" style="max-width: 150px; margin-top: 15px; display:none; border-radius: 5px;">
                </div>

                <div class="scan-line" id="loader"></div>

                <div class="text-center mt-3" id="submit-section" style="display:none;">
                    <button class="btn btn-orange w-100 py-3" id="extract-btn">Submit and Extract</button>
                </div>

                <div class="result-box" id="result-section">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold m-0">Converted Files</h5>
                        <div>
                            <button class="btn btn-sm btn-outline-dark" onclick="copyTxt()">Copy</button>
                            <button class="btn btn-sm btn-outline-dark" onclick="downloadTxt()">Download</button>
                        </div>
                    </div>
                    <textarea id="output-text"></textarea>
                    <button class="btn btn-dark w-100 mt-3" onclick="location.reload()">Start Again</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropArea = document.getElementById('drop-area');
    const preview = document.getElementById('preview');
    const submitSection = document.getElementById('submit-section');
    const resultSection = document.getElementById('result-section');
    const outputText = document.getElementById('output-text');
    const loader = document.getElementById('loader');

    let currentFile = null;

    dropArea.onclick = () => fileInput.click();

    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
        if(!file) return;
        currentFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'inline-block';
            submitSection.style.display = 'block';
            resultSection.style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    // সাবমিট এবং এপিআই কল
    document.getElementById('extract-btn').onclick = function() {
        if(!currentFile) return;

        let formData = new FormData();
        formData.append('image', currentFile);
        formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

        loader.style.display = 'block';
        submitSection.style.display = 'none';

        $.ajax({
            url: "{% url 'ocr_view' %}", // আপনার জ্যাঙ্গো ইউআরএল নাম নিশ্চিত করুন
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            success: function(res) {
                loader.style.display = 'none';
                if(res.status === 'success') {
                    resultSection.style.display = 'block';
                    outputText.value = res.extracted_text;
                } else {
                    alert("Error: " + res.message);
                    submitSection.style.display = 'block';
                }
            },
            error: function() {
                loader.style.display = 'none';
                alert("Server Connection Failed. Check if Hugging Face Space is Awake.");
                submitSection.style.display = 'block';
            }
        });
    };

    function copyTxt() { outputText.select(); document.execCommand('copy'); alert("Copied!"); }
    function downloadTxt() {
        const blob = new Blob([outputText.value], {type: "text/plain"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "flaremo_ocr.txt";
        link.click();
    }
</script>
{% endblock %}
