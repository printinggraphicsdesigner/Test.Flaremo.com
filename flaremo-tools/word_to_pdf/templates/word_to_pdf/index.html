{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-4xl mx-auto">

    <!-- Tool Header -->
    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold mb-4 text-gray-800">{{ tool.name }}</h1>
        <p class="text-xl text-gray-600">{{ tool.description }}</p>
    </div>

    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-6 py-4 rounded-2xl mb-8">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" enctype="multipart/form-data" class="bg-white p-10 rounded-3xl shadow-lg">
        {% csrf_token %}
        
        <div class="mb-8">
            <label class="block text-lg font-medium mb-3">Select Word File(.docx)</label>
            {{ form.word_file }}
            <p class="text-sm text-gray-500 mt-2"> Upload Only Docx File </p>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-5 px-8 rounded-2xl text-lg transition">
            Convert To PDF
        </button>
    </form>
    </div>

      <!-- 🔽 Tool Content (Guide Section) -->
<div class="max-w-5xl mx-auto mt-10">
    <div class="prose max-w-none">
        {{ tool.content|safe }}
    </div>
</div>


</div>
{% endblock %}
