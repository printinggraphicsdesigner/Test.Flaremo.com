{% extends 'base.html' %}

{% block content %}
<div class="max-w-6xl mx-auto py-10">
    <h1 class="text-3xl font-bold mb-6">Blog</h1>

    <div class="grid md:grid-cols-3 gap-6">
        {% for post in posts %}
        <a href="/blog/{{ post.slug }}/" class="bg-white rounded-xl shadow overflow-hidden hover:shadow-lg transition">

            {% if post.featured_image %}
                <img src="{{ post.featured_image.url }}" class="w-full h-48 object-cover">
            {% endif %}

            <div class="p-4">
                <h2 class="text-lg font-semibold">{{ post.title }}</h2>
                <p class="text-sm text-gray-500 mt-2">{{ post.created_at|date:"F d, Y" }}</p>
            </div>

        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
