{% extends 'base.html' %}
{% block content %}
<div class="text-center mb-12">
    <h1 class="text-4xl font-bold text-gray-800 mb-4">স্বাগতম Flaremo Tools এ</h1>
    <p class="text-xl text-gray-600">১০০+ ফ্রি অনলাইন টুলস এক জায়গায়</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for tool in tools %}
    <a href="{{ tool.url }}" 
       class="block p-8 bg-white rounded-3xl shadow hover:shadow-xl transition-all hover:-translate-y-1">
        <div class="text-6xl mb-6">{{ tool.icon }}</div>
        <h3 class="text-2xl font-semibold mb-3">{{ tool.name }}</h3>
        <p class="text-gray-600">{{ tool.description }}</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
