{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow">

    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

    {% if error %}
        <div class="bg-red-100 text-red-600 p-3 mb-4 rounded">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username"
            class="w-full mb-4 p-3 border rounded" required>

        <input type="password" name="password" placeholder="Password"
            class="w-full mb-4 p-3 border rounded" required>

        <button class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700">
            Login
        </button>
    </form>

    <p class="text-center mt-4">
        Don't have an account?
        <a href="/register/" class="text-blue-600">Register</a>
    </p>

</div>
{% endblock %}
