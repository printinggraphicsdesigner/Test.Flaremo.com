{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow">

    <h2 class="text-xl font-bold mb-4">Forgot Password</h2>

    {% if error %}
        <div class="text-red-600 mb-3">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/account/forgot-password/">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Enter your email"
            class="w-full p-3 border rounded mb-4" required>

        <button class="w-full bg-blue-600 text-white py-3 rounded">
            Send OTP
        </button>
    </form>

</div>

{% endblock %}
