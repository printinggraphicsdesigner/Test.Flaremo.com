{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow">

    <h2 class="text-xl font-bold mb-4 text-center">Verify OTP</h2>

    {% if error %}
        <div class="bg-red-100 text-red-600 p-3 mb-4 rounded">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="otp" placeholder="Enter OTP"
            class="w-full mb-4 p-3 border rounded" required>

        <button class="w-full bg-blue-600 text-white py-3 rounded">
            Verify
        </button>
    </form>

</div>
{% endblock %}
