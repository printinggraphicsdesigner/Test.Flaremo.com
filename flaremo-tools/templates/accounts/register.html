{% extends 'base.html' %}

{% block content %}
<div class="max-w-lg mx-auto mt-16 bg-white p-8 rounded-xl shadow">

    <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>

    {% if error %}
        <div class="bg-red-100 text-red-600 p-3 mb-4 rounded">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="full_name" placeholder="Full Name"
            class="w-full mb-3 p-3 border rounded" required>

        <input type="text" name="username" placeholder="Username"
            class="w-full mb-3 p-3 border rounded" required>

        <input type="email" name="email" placeholder="Email"
            class="w-full mb-3 p-3 border rounded" required>

        <input type="text" name="phone" placeholder="Phone Number"
            class="w-full mb-3 p-3 border rounded">

        <input type="password" name="password" placeholder="Password"
            class="w-full mb-3 p-3 border rounded" required>

        <input type="password" name="confirm_password" placeholder="Confirm Password"
            class="w-full mb-4 p-3 border rounded" required>

        <button class="w-full bg-green-600 text-white py-3 rounded hover:bg-green-700">
            Register
        </button>
    </form>

    <p class="text-center mt-4">
        Already have an account?
        <a href="/login/" class="text-blue-600">Login</a>
    </p>

</div>
{% endblock %}
