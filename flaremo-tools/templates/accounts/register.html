{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow">

    <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

    {% if error %}
        <div class="bg-red-100 text-red-600 p-3 mb-4 rounded">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <!-- NAME -->
        <input type="text" name="username" placeholder="Username"
            class="w-full mb-4 p-3 border rounded" required>

        <!-- EMAIL -->
        <input type="email" name="email" placeholder="Email"
            class="w-full mb-4 p-3 border rounded" required>

        <!-- PASSWORD -->
        <div class="relative mb-2">
            <input type="password" id="password" name="password"
                class="w-full p-3 border rounded" placeholder="Password" required onkeyup="checkStrength()">

            <span onclick="togglePassword('password')" 
                class="absolute right-3 top-3 cursor-pointer">👁️</span>
        </div>

        <!-- STRENGTH BAR -->
        <div class="mb-4">
            <div id="strengthText" class="text-sm mb-1"></div>
            <div class="w-full h-2 bg-gray-200 rounded">
                <div id="strengthBar" class="h-2 rounded"></div>
            </div>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="relative mb-4">
            <input type="password" id="confirm_password" name="confirm_password"
                class="w-full p-3 border rounded" placeholder="Confirm Password" required>

            <span onclick="togglePassword('confirm_password')" 
                class="absolute right-3 top-3 cursor-pointer">👁️</span>
        </div>

        <button class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700">
            Register
        </button>
    </form>

    <p class="text-center mt-4">
        Already have an account?
        <a href="/login/" class="text-blue-600">Login</a>
    </p>

</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
}

// 🔥 PASSWORD STRENGTH
function checkStrength() {
    const pass = document.getElementById('password').value;
    const bar = document.getElementById('strengthBar');
    const text = document.getElementById('strengthText');

    let strength = 0;

    if (pass.length > 5) strength++;
    if (pass.match(/[A-Z]/)) strength++;
    if (pass.match(/[0-9]/)) strength++;
    if (pass.match(/[^A-Za-z0-9]/)) strength++;

    if (strength === 0) {
        bar.style.width = "0%";
        text.innerText = "";
    } 
    else if (strength <= 2) {
        bar.style.width = "40%";
        bar.style.background = "red";
        text.innerText = "Weak Password";
    } 
    else if (strength === 3) {
        bar.style.width = "70%";
        bar.style.background = "orange";
        text.innerText = "Medium Password";
    } 
    else {
        bar.style.width = "100%";
        bar.style.background = "green";
        text.innerText = "Strong Password";
    }
}
</script>

{% endblock %}
