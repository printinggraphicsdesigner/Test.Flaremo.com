{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow">

    <h2 class="text-2xl font-bold mb-6 text-center">Reset Password</h2>

    {% if error %}
        <div class="bg-red-100 text-red-600 p-3 mb-4 rounded">
            {{ error }}
        </div>
    {% endif %}

    {% if success %}
        <div class="bg-green-100 text-green-600 p-3 mb-4 rounded">
            {{ success }}
        </div>
    {% endif %}

    <form method="POST" action="/account/reset-password/">
        {% csrf_token %}

        <!-- OTP -->
        <input type="text" name="otp" placeholder="Enter OTP"
            class="w-full mb-4 p-3 border rounded" required>

        <!-- PASSWORD -->
        <div class="relative mb-4">
            <input type="password" id="password" name="password"
                class="w-full p-3 border rounded" placeholder="New Password" required>

            <span onclick="togglePassword('password')" 
                class="absolute right-3 top-3 cursor-pointer">👁️</span>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="relative mb-4">
            <input type="password" id="confirm_password" name="confirm_password"
                class="w-full p-3 border rounded" placeholder="Confirm Password" required>

            <span onclick="togglePassword('confirm_password')" 
                class="absolute right-3 top-3 cursor-pointer">👁️</span>
        </div>

        <!-- PASSWORD STRENGTH -->
        <div class="mb-4">
            <div class="w-full bg-gray-200 h-2 rounded">
                <div id="strengthBar" class="h-2 rounded"></div>
            </div>
            <p id="strengthText" class="text-sm mt-1"></p>
        </div>

        <button class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700">
            Reset Password
        </button>
    </form>

</div>

<script>
// 👁️ Show/Hide password
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
}

// 🔥 Password Strength
const passwordInput = document.getElementById('password');
const bar = document.getElementById('strengthBar');
const text = document.getElementById('strengthText');

passwordInput.addEventListener('input', function() {
    const val = passwordInput.value;
    let strength = 0;

    if (val.length >= 6) strength++;
    if (val.match(/[A-Z]/)) strength++;
    if (val.match(/[0-9]/)) strength++;
    if (val.match(/[^A-Za-z0-9]/)) strength++;

    if (strength === 1) {
        bar.style.width = '25%';
        bar.style.background = 'red';
        text.innerText = 'Weak';
    } else if (strength === 2) {
        bar.style.width = '50%';
        bar.style.background = 'orange';
        text.innerText = 'Medium';
    } else if (strength === 3) {
        bar.style.width = '75%';
        bar.style.background = 'blue';
        text.innerText = 'Strong';
    } else if (strength === 4) {
        bar.style.width = '100%';
        bar.style.background = 'green';
        text.innerText = 'Very Strong';
    } else {
        bar.style.width = '0%';
        text.innerText = '';
    }
});
</script>

{% endblock %}
