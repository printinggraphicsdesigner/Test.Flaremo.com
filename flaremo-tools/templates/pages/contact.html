{% extends 'base.html' %}
{% block title %}Contact{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow">

    <h1 class="text-3xl font-bold mb-6">Contact Us</h1>

    <p class="mb-6 text-gray-600">
        Have questions or need help? Send us a message.
    </p>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Your Name"
            class="w-full mb-4 p-3 border rounded-xl">

        <input type="email" name="email" placeholder="Your Email"
            class="w-full mb-4 p-3 border rounded-xl">

        <textarea name="message" rows="5" placeholder="Your Message"
            class="w-full mb-4 p-3 border rounded-xl"></textarea>

        <button class="bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700">
            Send Message
        </button>
    </form>

</div>

{% endblock %}
